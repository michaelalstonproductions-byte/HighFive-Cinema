name: highfive-cinema-production

services:
  api:
    build:
      context: ../staging_server_scaffold
    env_file:
      - ./.env.production
    environment:
      HIGHFIVE_SERVER_HOST: 0.0.0.0
      HIGHFIVE_BACKEND_ENV: production
      HIGHFIVE_DEPLOYMENT_STATUS: production_infrastructure_ready
      HIGHFIVE_READY_FILE: /tmp/highfive-api-ready.json
    ports:
      - "${HIGHFIVE_API_PORT:-8787}:8787"
    volumes:
      - highfive_api_state:/var/lib/highfive
      - highfive_media_objects:/var/lib/highfive-media
    depends_on:
      postgres:
        condition: service_healthy
      object-storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/health"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  media-worker:
    build:
      context: ../staging_server_scaffold
    command: ["node", "compiled/runtime/mediaWorker.js"]
    env_file:
      - ./.env.production
    environment:
      HIGHFIVE_BACKEND_ENV: production
      HIGHFIVE_DEPLOYMENT_STATUS: production_infrastructure_ready
      HIGHFIVE_READY_FILE: /tmp/highfive-media-worker-ready.json
    volumes:
      - highfive_media_objects:/var/lib/highfive-media
      - highfive_processing_state:/var/lib/highfive-processing
    depends_on:
      object-storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/highfive-media-worker-ready.json"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${HIGHFIVE_POSTGRES_DB:-highfive_cinema}
      POSTGRES_USER: ${HIGHFIVE_POSTGRES_USER:-highfive_app}
      POSTGRES_PASSWORD_FILE: ${HIGHFIVE_POSTGRES_PASSWORD_FILE:?set HIGHFIVE_POSTGRES_PASSWORD_FILE}
    volumes:
      - highfive_postgres_data:/var/lib/postgresql/data
      - ../staging_server_scaffold/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  object-storage:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER_FILE: ${HIGHFIVE_OBJECT_STORAGE_ACCESS_KEY_FILE:?set HIGHFIVE_OBJECT_STORAGE_ACCESS_KEY_FILE}
      MINIO_ROOT_PASSWORD_FILE: ${HIGHFIVE_OBJECT_STORAGE_SECRET_KEY_FILE:?set HIGHFIVE_OBJECT_STORAGE_SECRET_KEY_FILE}
    volumes:
      - highfive_object_storage:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  cdn:
    image: nginx:1.27-alpine
    ports:
      - "${HIGHFIVE_CDN_PORT:-8080}:80"
    volumes:
      - ./nginx/highfive-cdn.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  monitoring:
    image: prom/prometheus:v3.4.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${HIGHFIVE_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - highfive_prometheus_data:/prometheus
    restart: unless-stopped

  logging:
    image: fluent/fluent-bit:3.2
    ports:
      - "${HIGHFIVE_LOG_PORT:-24224}:24224"
    volumes:
      - ./logging/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - highfive_logs:/var/log/highfive
    restart: unless-stopped

  dashboard:
    image: nginx:1.27-alpine
    ports:
      - "${HIGHFIVE_DASHBOARD_PORT:-8790}:80"
    volumes:
      - ./monitoring/health-dashboard.html:/usr/share/nginx/html/index.html:ro
    restart: unless-stopped

volumes:
  highfive_api_state:
  highfive_media_objects:
  highfive_processing_state:
  highfive_postgres_data:
  highfive_object_storage:
  highfive_prometheus_data:
  highfive_logs:

