global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: highfive-api-health
    metrics_path: /health
    static_configs:
      - targets:
          - api:8787

  - job_name: highfive-cdn-health
    metrics_path: /health
    static_configs:
      - targets:
          - cdn:80

