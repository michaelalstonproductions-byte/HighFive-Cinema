services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: highfive_cinema
      POSTGRES_USER: highfive_local
      POSTGRES_PASSWORD: highfive_local_only
    ports:
      - "54329:5432"
    volumes:
      - highfive_catalog_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro

  catalog:
    build: .
    environment:
      HIGHFIVE_BACKEND_ENV: local_smoke
      HIGHFIVE_PROVIDER_MODE: mock
      HIGHFIVE_SERVER_HOST: 127.0.0.1
      HIGHFIVE_SERVER_PORT: 8787
    ports:
      - "8787:8787"
    depends_on:
      - postgres

volumes:
  highfive_catalog_data:
